name: tests

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CoffeeHub.sln

      - name: Build
        run: dotnet build CoffeeHub.sln --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test CoffeeHub.Tests/CoffeeHub.Tests.csproj --configuration Release --no-build --settings CoffeeHub.Tests/coverlet.runsettings --collect:"XPlat Code Coverage"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: CoffeeHub.Tests/TestResults
